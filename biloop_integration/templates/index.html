<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biloop Integration Dashboard</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F5A623;
            --primary-hover: #D9891F;
            --secondary: #2C2C2C;
            --bg-color: #000000;
            --card-bg: #121212;
            --sidebar-bg: #0A0A0A;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --border-color: #333333;
            --success: #10B981;
            --error: #EF4444;
            --sidebar-width: 250px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0; /* Removed body padding for full-bleed layout */
            box-sizing: border-box;
            display: flex;
            height: 100vh;
            overflow: hidden; /* Prevent body scroll, handle scroll in main content */
        }

        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 0 24px 24px 24px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 16px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .nav-item.active {
            background-color: rgba(245, 166, 35, 0.15);
            color: var(--primary);
            border-left: 3px solid var(--primary);
            border-radius: 0 8px 8px 0; /* Adjust radius for left border */
        }

        /* Main Content Styles */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .view-container {
            display: none; /* Hidden by default */
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .view-container.active {
            display: flex;
        }

        /* Original App View Constraints */
        .app-view {
            padding: 40px;
            overflow-y: auto;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #000000;
            box-shadow: 0 4px 6px -1px rgba(245, 166, 35, 0.4);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #2D3748;
            border-color: #4A5568;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: rgba(79, 70, 229, 0.1);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .table-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--primary);
            padding: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #FFFFFF;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
            vertical-align: middle;
        }

        tr {
            transition: var(--transition);
        }

        tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.02);
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .currency {
            font-family: monospace;
            font-size: 1rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            background-color: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
        }

        .status-badge.success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .status-badge.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .loader {
            display: flex;
            justify-content: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Checkbox Styling */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        input[type="checkbox"] {
            appearance: none;
            background-color: var(--bg-color);
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.15em;
            height: 1.15em;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        input[type="checkbox"]::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em var(--primary);
            background-color: var(--primary);
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        input[type="checkbox"]:checked {
            border-color: var(--primary);
        }

        input[type="checkbox"]:checked::before {
            transform: scale(1);
        }
        
        /* Iframe styling */
        .iframe-container {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff; /* Most external tools imply white background */
        }

    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-header">
        <h2>Biloop Hub</h2>
    </div>
    <div class="nav-menu">
        <div class="nav-item active" onclick="switchView('appView', this)">
            📄 Invoices Upload
        </div>
        <div class="nav-item" onclick="switchView('sheetsView', this)">
            📊 Google Sheets
        </div>
        <div class="nav-item" onclick="switchView('lookerView', this)">
            📈 Looker Studio
        </div>
    </div>
</div>

<!-- Main Content Area -->
<div class="main-content">

    <!-- View 1: Native App -->
    <div id="appView" class="view-container app-view active">
        <div class="container">
            <header>
                <div>
                    <h1>Invoices Dashboard</h1>
                    <p style="color: var(--text-muted); margin-top: 8px;">Live sync from Google Sheets to Biloop API</p>
                </div>
                <div class="header-actions">
                    <button class="btn-secondary" onclick="fetchData()" id="refreshBtn">
                        🔄 Refresh Data
                    </button>
                    <button class="btn-primary" onclick="saveDates()" id="saveBtn">
                        💾 Save Dates
                    </button>
                    <button class="btn-primary" onclick="uploadSelected()" id="uploadBtn">
                        ☁️ Upload to Biloop
                    </button>
                </div>
            </header>

            <div class="table-container">
                <div id="loader" class="loader">
                    <div class="spinner"></div>
                </div>
                
                <table id="invoiceTable" style="display: none;">
                    <thead>
                        <tr>
                            <th style="width: 50px;">
                                <div class="checkbox-wrapper">
                                    <input type="checkbox" id="selectAll" onchange="toggleAll(this)">
                                </div>
                            </th>
                            <th>Cliente</th>
                            <th>Candidato</th>
                            <th>Proceso</th>
                            <th>Fecha Factura</th>
                            <th>Importe</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- View 2: Google Sheets -->
    <div id="sheetsView" class="view-container">
        <!-- Google Sheet URL derived from fetcher -->
        <iframe class="iframe-container" src="https://docs.google.com/spreadsheets/d/15ZGlivp5_QRf60X7NChILJBLKE8m54_Z9-s0kGxCQZk/edit?usp=sharing&widget=true&headers=false"></iframe>
    </div>

    <!-- View 3: Looker Studio -->
    <div id="lookerView" class="view-container">
        <iframe class="iframe-container" src="https://lookerstudio.google.com/embed/reporting/32fea7a0-0010-4831-b067-a8b387ee9cdd/page/p_s33znkum1d" allowfullscreen sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
    </div>

</div>

<script>
    // Navigation Logic
    function switchView(viewId, element) {
        // Update Active Nav Item
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        // Update Active View Container
        document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    // Existing App Logic
    let globalData = [];

    async function fetchData() {
        const loader = document.getElementById('loader');
        const table = document.getElementById('invoiceTable');
        const tbody = document.getElementById('tableBody');
        const refreshBtn = document.getElementById('refreshBtn');
        
        refreshBtn.disabled = true;
        loader.style.display = 'flex';
        table.style.display = 'none';
        tbody.innerHTML = '';

        try {
            const response = await fetch('/api/invoices');
            const data = await response.json();
            
            if (response.ok) {
                globalData = data;
                renderTable(data);
                table.style.display = 'table';
            } else {
                alert('Error fetching data: ' + data.error);
            }
        } catch (error) {
            console.error('Failed to fetch:', error);
            alert('Failed to connect to the backend server.');
        } finally {
            loader.style.display = 'none';
            refreshBtn.disabled = false;
            document.getElementById('selectAll').checked = false;
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        data.forEach((invoice, index) => {
            const originalDateStr = invoice['Fecha Factura'] || '';
            let dateVal = originalDateStr;
            let formattedDate = "";
            
            if (dateVal && dateVal.includes('/')) {
                const parts = dateVal.split('/');
                if (parts.length === 3) {
                    formattedDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
                }
            } else {
                formattedDate = dateVal;
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" class="row-checkbox" value="${index}">
                    </div>
                </td>
                <td style="font-weight: 500;">${invoice['Cliente']}</td>
                <td>${invoice['Candidato']}</td>
                <td style="color: var(--text-muted);">${invoice['Proceso']}</td>
                <td>
                    <input type="date" class="date-input" id="date-${index}" value="${formattedDate}" 
                           data-original="${formattedDate}" data-row="${invoice['_sheet_row_index']}"
                           style="background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 4px 8px; border-radius: 4px; font-family: inherit;">
                </td>
                <td class="currency">€${invoice['Importe Cobro'].toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                <td><span class="status-badge" id="status-${index}">Pending</span></td>
                <td>
                    <button class="btn-outline" style="padding: 6px 12px; font-size: 0.8rem;" onclick="uploadSingle(${index})" id="btn-${index}">
                        Upload
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function toggleAll(source) {
        const checkboxes = document.querySelectorAll('.row-checkbox');
        checkboxes.forEach(cb => cb.checked = source.checked);
    }

    async function uploadInvoice(index) {
        const invoiceData = globalData[index];
        const statusBadge = document.getElementById(`status-${index}`);
        const btn = document.getElementById(`btn-${index}`);
        
        statusBadge.className = 'status-badge';
        statusBadge.innerText = 'Uploading...';
        btn.disabled = true;
        
        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(invoiceData)
            });
            
            const result = await response.json();
            
            if (response.ok && result.success) {
                statusBadge.className = 'status-badge success';
                statusBadge.innerText = 'Uploaded ✓';
                btn.innerText = 'Done';
            } else {
                statusBadge.className = 'status-badge error';
                statusBadge.innerText = 'Failed ✗';
                btn.disabled = false;
                btn.innerText = 'Retry';
                console.error("Upload failed:", result.message);
            }
        } catch (error) {
            statusBadge.className = 'status-badge error';
            statusBadge.innerText = 'Error ✗';
            btn.disabled = false;
            console.error("Network error:", error);
        }
    }

    function uploadSingle(index) {
        uploadInvoice(index);
    }

    async function saveDates() {
        const updates = [];
        globalData.forEach((invoice, index) => {
            const inputElement = document.getElementById(`date-${index}`);
            const originalVal = inputElement.getAttribute('data-original');
            const currentVal = inputElement.value;
            const rowIdx = inputElement.getAttribute('data-row');
            
            if (currentVal && currentVal !== originalVal) {
                // Convert YYYY-MM-DD back to DD/MM/YYYY for the sheet
                const parts = currentVal.split('-');
                let sheetFormattedDate = currentVal;
                if (parts.length === 3) {
                    sheetFormattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
                
                updates.push({
                    row_index: parseInt(rowIdx),
                    new_date: sheetFormattedDate
                });
            }
        });

        if (updates.length === 0) {
            alert("No dates were modified.");
            return;
        }

        const saveBtn = document.getElementById('saveBtn');
        const originalText = saveBtn.innerHTML;
        saveBtn.innerText = 'Saving...';
        saveBtn.disabled = true;

        try {
            const response = await fetch('/api/update_dates', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updates)
            });
            
            const result = await response.json();
            
            if (response.ok && result.success) {
                alert(result.message);
                // Refresh data to show changes and reset 'original' state
                await fetchData();
                
                // Refresh Looker Studio iframe completely
                const lookerIframe = document.querySelector('#lookerView iframe');
                if (lookerIframe) {
                    lookerIframe.src = lookerIframe.src;
                }
                
                // Refresh Google Sheets iframe completely
                const sheetsIframe = document.querySelector('#sheetsView iframe');
                if (sheetsIframe) {
                    sheetsIframe.src = sheetsIframe.src;
                }
            } else {
                alert('Error processing updates: ' + result.message);
            }
        } catch (error) {
            console.error('Failed to save dates:', error);
            alert('Failed to connect to server when saving.');
        } finally {
            saveBtn.innerHTML = originalText;
            saveBtn.disabled = false;
        }
    }

    async function uploadSelected() {
        const checkboxes = document.querySelectorAll('.row-checkbox:checked');
        const uploadBtn = document.getElementById('uploadBtn');
        
        if (checkboxes.length === 0) {
            alert('Please select at least one invoice to upload.');
            return;
        }
        
        uploadBtn.disabled = true;
        const originalText = uploadBtn.innerHTML;
        uploadBtn.innerHTML = 'Uploading...';
        
        // Upload sequentially to not overwhelm the API
        for (let i = 0; i < checkboxes.length; i++) {
            const index = checkboxes[i].value;
            await uploadInvoice(index);
            // Optionally uncheck after success
            if(document.getElementById(`status-${index}`).className.includes('success')) {
                checkboxes[i].checked = false;
            }
        }
        
        uploadBtn.disabled = false;
        uploadBtn.innerHTML = originalText;
        document.getElementById('selectAll').checked = false;
    }

    // Load data automatically on start
    document.addEventListener("DOMContentLoaded", fetchData);

</script>

</body>
</html>
